name: Bug report
description: Report a reproducible problem in admin, webmail, or Pages Functions.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - apps/admin
        - apps/webmail
        - Cloudflare Pages Functions
        - Deployment / GitHub Actions
        - Documentation
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the smallest reproducible steps.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, Cloudflare Pages environment, upstream Worker version, and whether this is Preview or Production.
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Do not include API tokens, passwords, JWTs, secrets, or real KV Namespace IDs.
