name = "loven7-mail-webmail"
pages_build_output_dir = "./dist"
compatibility_date = "2026-05-11"

# 分享链接功能需要 Cloudflare KV。建议在 Cloudflare Pages 控制台绑定：
#   binding: SHARE_KV
#   namespace: 你自己创建的 KV Namespace
#
# Wrangler Direct Upload 部署时需要在本地配置中保留绑定，否则新部署的
# Pages Functions runtime 拿不到 SHARE_KV。
[[kv_namespaces]]
binding = "SHARE_KV"
