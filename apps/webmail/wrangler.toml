name = "loven7-mail-webmail"
pages_build_output_dir = "./dist"
compatibility_date = "2026-05-11"

# 分享链接功能需要 Cloudflare KV。建议在 Cloudflare Pages 控制台绑定：
#   binding: SHARE_KV
#   namespace: 你自己创建的 KV Namespace
#
# Wrangler Direct Upload 部署时，如果你明确设置了
# WEBMAIL_USE_LOCAL_WRANGLER_CONFIG=1，需要把下面示例改成你自己的 KV ID
# 并取消注释。公开仓库不能提交真实 KV Namespace ID。
#
# [[kv_namespaces]]
# binding = "SHARE_KV"
# id = "replace-with-your-production-kv-namespace-id"
# preview_id = "replace-with-your-preview-kv-namespace-id"

